<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopList — Smart Shopping Lists</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }
    input, select, button, textarea { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }
    ul, ol { list-style: none; }

    /* ===== CSS CUSTOM PROPERTIES ===== */
    :root {
      --color-bg: #f0f2f5;
      --color-surface: #ffffff;
      --color-surface-hover: #f7f8fa;
      --color-primary: #5B5FC7;
      --color-primary-hover: #4A4EB5;
      --color-primary-light: #EDEDF8;
      --color-danger: #E53935;
      --color-danger-hover: #C62828;
      --color-success: #43A047;
      --color-text: #1a1a2e;
      --color-text-secondary: #64748b;
      --color-text-muted: #94a3b8;
      --color-border: #e2e8f0;
      --color-shadow: rgba(0, 0, 0, 0.08);

      --sidebar-width: 300px;
      --sidebar-bg: #1a1a2e;
      --sidebar-bg-hover: #252542;
      --sidebar-text: #cbd5e1;
      --sidebar-text-bright: #f1f5f9;
      --sidebar-active-bg: rgba(91, 95, 199, 0.2);
      --sidebar-active-border: var(--color-primary);

      --font-size-xs: 0.7rem;
      --font-size-sm: 0.8125rem;
      --font-size-base: 0.9375rem;
      --font-size-lg: 1.125rem;
      --font-size-xl: 1.375rem;
      --font-size-2xl: 1.75rem;

      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-full: 9999px;

      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);

      --z-sidebar: 100;
      --z-overlay: 90;
      --z-modal: 200;
    }

    /* ===== UTILITY CLASSES ===== */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-secondary); }

    /* ===== APP LAYOUT ===== */
    .app-container {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg) var(--space-lg) var(--space-md);
      flex-shrink: 0;
    }

    .app-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      color: var(--sidebar-text-bright);
      letter-spacing: -0.02em;
    }

    .sidebar-close-btn {
      display: none;
      color: var(--sidebar-text);
      font-size: 1.5rem;
      padding: var(--space-xs);
      border-radius: var(--radius-sm);
      transition: background var(--transition-fast);
    }
    .sidebar-close-btn:hover { background: var(--sidebar-bg-hover); }

    /* Tag Filter Bar */
    .tag-filter-bar {
      padding: 0 var(--space-lg) var(--space-sm);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      flex-shrink: 0;
    }

    .tag-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1.5px solid transparent;
      opacity: 0.5;
      color: #fff;
    }
    .tag-filter-chip:hover { opacity: 0.8; }
    .tag-filter-chip.active {
      opacity: 1;
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 0 8px rgba(255,255,255,0.1);
    }

    /* New List Button */
    .btn-new-list {
      margin: var(--space-sm) var(--space-lg);
      flex-shrink: 0;
    }

    /* Lists Navigation */
    .lists-nav {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xs) var(--space-sm);
    }

    .list-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-md);
      margin-bottom: 2px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      border-left: 3px solid transparent;
      user-select: none;
    }
    .list-card:hover {
      background: var(--sidebar-bg-hover);
    }
    .list-card.active {
      background: var(--sidebar-active-bg);
      border-left-color: var(--sidebar-active-border);
    }
    .list-card-content {
      flex: 1;
      min-width: 0;
    }
    .list-card-name {
      display: block;
      color: var(--sidebar-text-bright);
      font-size: var(--font-size-sm);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-top: 2px;
    }
    .list-card-count {
      font-size: var(--font-size-xs);
      color: var(--sidebar-text);
    }
    .list-card-tags {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      margin-left: var(--space-sm);
    }
    .tag-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Sidebar Footer */
    .sidebar-footer {
      display: flex;
      gap: var(--space-xs);
      padding: var(--space-md) var(--space-lg);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .sidebar-footer .btn-ghost {
      flex: 1;
      color: var(--sidebar-text);
      font-size: var(--font-size-xs);
      padding: var(--space-sm);
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }
    .sidebar-footer .btn-ghost:hover {
      background: var(--sidebar-bg-hover);
      color: var(--sidebar-text-bright);
    }

    /* ===== SIDEBAR OVERLAY ===== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: var(--z-overlay);
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.visible { display: block; }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg);
    }

    /* Mobile Header */
    .mobile-header {
      display: none;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    .hamburger-btn {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: var(--space-xs);
    }
    .hamburger-btn span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--color-text);
      border-radius: 1px;
      transition: all var(--transition-normal);
    }

    .mobile-list-title {
      font-size: var(--font-size-base);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: var(--space-xl);
      animation: fadeIn 0.4s ease;
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: var(--space-lg);
      opacity: 0.3;
    }
    .empty-state h2 {
      font-size: var(--font-size-lg);
      color: var(--color-text);
      margin-bottom: var(--space-sm);
      font-weight: 600;
    }
    .empty-state p {
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
    }

    /* List Detail */
    .list-detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg) var(--space-xl) var(--space-sm);
      flex-shrink: 0;
    }
    .list-name {
      font-size: var(--font-size-2xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      outline: none;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      transition: border-color var(--transition-fast);
      max-width: 60%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-name.editing {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
      white-space: normal;
      overflow: visible;
    }

    .list-actions {
      display: flex;
      gap: var(--space-xs);
    }

    /* List Tags */
    .list-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      padding: 0 var(--space-xl) var(--space-md);
      flex-shrink: 0;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: #fff;
      cursor: default;
    }
    .tag-chip-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      background: rgba(0,0,0,0.2);
      transition: background var(--transition-fast);
    }
    .tag-chip-remove:hover { background: rgba(0,0,0,0.4); }
    .tag-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 500;
      color: var(--color-text-secondary);
      border: 1.5px dashed var(--color-border);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .tag-add-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* Add Item Form */
    .add-item-form {
      display: flex;
      gap: var(--space-sm);
      padding: 0 var(--space-xl) var(--space-md);
      flex-shrink: 0;
    }
    .add-item-form input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .add-item-form select {
      width: 140px;
      flex-shrink: 0;
    }
    .quantity-input {
      width: 60px !important;
      text-align: center;
      flex-shrink: 0;
    }
    .add-item-form .btn { flex-shrink: 0; }

    /* Form Controls */
    input[type="text"], input[type="number"], select {
      padding: 10px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: var(--font-size-sm);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }
    input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      padding: 2px;
      background: transparent;
    }

    /* Progress Bar */
    .progress-container {
      margin: 0 var(--space-xl) var(--space-md);
      background: var(--color-border);
      border-radius: var(--radius-full);
      height: 6px;
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      transition: width var(--transition-slow), background var(--transition-slow);
      min-width: 0;
    }
    .progress-bar.complete { background: var(--color-success); }
    .progress-text {
      display: block;
      text-align: right;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: 4px;
      padding: 0 var(--space-xl);
      flex-shrink: 0;
    }

    /* Items Container */
    .items-container {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-sm) var(--space-xl) var(--space-xl);
    }

    .empty-items-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl);
      text-align: center;
      color: var(--color-text-muted);
    }
    .empty-items-state .icon { font-size: 2.5rem; margin-bottom: var(--space-md); opacity: 0.4; }
    .empty-items-state p { font-size: var(--font-size-sm); }

    /* Category Group */
    .category-group {
      margin-bottom: var(--space-lg);
    }
    .category-group-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-xs) 0;
      margin-bottom: var(--space-xs);
      border-bottom: 2px solid var(--cat-color, var(--color-border));
    }
    .category-group-emoji { font-size: var(--font-size-base); }
    .category-group-name {
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-text);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .category-group-count {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-left: auto;
    }

    /* Item Row */
    .item-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-sm);
      border-radius: var(--radius-md);
      transition: background var(--transition-fast), opacity var(--transition-normal);
      animation: slideInUp 0.25s ease;
    }
    .item-row:hover {
      background: var(--color-surface-hover);
    }
    .item-row.checked {
      opacity: 0.5;
    }
    .item-row.checked .item-name {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    /* Custom Checkbox */
    .item-checkbox {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .item-checkbox input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .checkmark {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--cat-color, var(--color-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    .checkmark::after {
      content: '';
      display: none;
      width: 5px;
      height: 10px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-top: -2px;
    }
    .item-checkbox input:checked + .checkmark {
      background: var(--cat-color, var(--color-primary));
      border-color: var(--cat-color, var(--color-primary));
    }
    .item-checkbox input:checked + .checkmark::after {
      display: block;
    }

    .item-name {
      flex: 1;
      min-width: 0;
      font-size: var(--font-size-base);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--transition-normal);
    }

    .item-quantity {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }
    .item-quantity button {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      transition: all var(--transition-fast);
      font-weight: 600;
    }
    .item-quantity button:hover {
      background: var(--color-primary-light);
      color: var(--color-primary);
    }
    .item-quantity-value {
      min-width: 20px;
      text-align: center;
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
    }

    .item-action-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      transition: all var(--transition-fast);
      flex-shrink: 0;
      opacity: 0;
    }
    .item-row:hover .item-action-btn { opacity: 1; }
    .item-action-btn:hover {
      background: var(--color-primary-light);
      color: var(--color-primary);
    }
    .item-action-btn.delete:hover {
      background: #FDECEA;
      color: var(--color-danger);
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: var(--font-size-sm);
      font-weight: 600;
      transition: all var(--transition-fast);
      white-space: nowrap;
      line-height: 1;
    }
    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }

    .btn-danger {
      background: transparent;
      color: var(--color-danger);
    }
    .btn-danger:hover { background: #FDECEA; }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-secondary);
    }
    .btn-ghost:hover { background: var(--color-surface-hover); }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      border-radius: var(--radius-sm);
      color: var(--color-text-secondary);
    }
    .btn-icon:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
    }
    .btn-icon.btn-danger:hover {
      background: #FDECEA;
      color: var(--color-danger);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: var(--font-size-xs);
      border-radius: var(--radius-sm);
    }

    /* ===== MODAL ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-lg) var(--space-lg) var(--space-sm);
      flex-shrink: 0;
    }
    .modal-title {
      font-size: var(--font-size-lg);
      font-weight: 700;
    }
    .modal-close-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      font-size: 1.3rem;
      color: var(--color-text-muted);
      transition: all var(--transition-fast);
    }
    .modal-close-btn:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
    }
    .modal-body {
      padding: var(--space-md) var(--space-lg);
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-lg) var(--space-lg);
      flex-shrink: 0;
    }

    /* Modal Form Elements */
    .modal-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-row-emoji { font-size: var(--font-size-lg); flex-shrink: 0; }
    .modal-row-name { flex: 1; min-width: 0; font-size: var(--font-size-sm); }
    .modal-row input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      font-size: var(--font-size-sm);
    }
    .modal-add-form {
      display: flex;
      gap: var(--space-sm);
      padding-top: var(--space-md);
      margin-top: var(--space-sm);
      border-top: 1px solid var(--color-border);
    }
    .modal-add-form input[type="text"] { flex: 1; min-width: 0; }

    .default-badge {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      background: var(--color-surface-hover);
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    /* Tag Picker Grid */
    .tag-picker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .tag-picker-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all var(--transition-fast);
      color: #fff;
      opacity: 0.5;
    }
    .tag-picker-chip:hover { opacity: 0.75; }
    .tag-picker-chip.selected {
      opacity: 1;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* Confirm modal */
    .confirm-message {
      font-size: var(--font-size-base);
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    /* Edit item modal */
    .edit-item-form { display: flex; flex-direction: column; gap: var(--space-md); }
    .edit-item-form label {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      display: block;
    }
    .edit-item-form input, .edit-item-form select {
      width: 100%;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        width: 85vw;
        max-width: 320px;
        transform: translateX(-100%);
        transition: transform var(--transition-slow);
        z-index: var(--z-sidebar);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-close-btn { display: flex; }

      .mobile-header { display: flex; }

      .list-header { padding: var(--space-md) var(--space-lg) var(--space-sm); }
      .list-name { font-size: var(--font-size-xl); max-width: 55%; }
      .list-tags { padding: 0 var(--space-lg) var(--space-sm); }

      .add-item-form {
        padding: 0 var(--space-lg) var(--space-md);
        flex-wrap: wrap;
      }
      .add-item-form input[type="text"] { flex: 1 1 100%; }
      .add-item-form select { flex: 1; }
      .quantity-input { width: 50px !important; }

      .progress-container { margin: 0 var(--space-lg) var(--space-sm); }
      .progress-text { padding: 0 var(--space-lg); }

      .items-container { padding: var(--space-sm) var(--space-lg) var(--space-lg); }

      .item-action-btn { opacity: 1; }

      .modal { width: 95%; }
    }

    @media (max-width: 480px) {
      .list-header { flex-wrap: wrap; gap: var(--space-sm); }
      .list-name { max-width: 100%; flex: 1 1 100%; }
    }
  </style>
</head>
<body>

  <!-- Overlay for mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-container">
    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">&#128722; ShopList</h1>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close sidebar">&times;</button>
      </div>

      <!-- Tag Filter Bar -->
      <div class="tag-filter-bar" id="tagFilterBar"></div>

      <!-- New List Button -->
      <button class="btn btn-primary btn-new-list" id="newListBtn">+ New List</button>

      <!-- Lists Navigation -->
      <nav class="lists-nav" id="listsNav"></nav>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <button class="btn-ghost" id="manageCategoriesBtn">&#127912; Categories</button>
        <button class="btn-ghost" id="manageTagsBtn">&#127991;&#65039; Tags</button>
      </div>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="main-content" id="mainContent">
      <!-- Mobile Header -->
      <header class="mobile-header" id="mobileHeader">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <h2 class="mobile-list-title" id="mobileListTitle">ShopList</h2>
      </header>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">&#128722;</div>
        <h2>Select a list or create a new one</h2>
        <p>Your shopping lists will appear in the sidebar</p>
      </div>

      <!-- List Detail View -->
      <div class="list-detail" id="listDetail" hidden>
        <!-- List Header -->
        <div class="list-header">
          <h2 class="list-name" id="listName"></h2>
          <div class="list-actions">
            <button class="btn btn-icon" id="editListNameBtn" title="Rename">&#9999;&#65039;</button>
            <button class="btn btn-icon" id="duplicateListBtn" title="Duplicate">&#128203;</button>
            <button class="btn btn-icon btn-danger" id="deleteListBtn" title="Delete">&#128465;&#65039;</button>
          </div>
        </div>

        <!-- List Tags -->
        <div class="list-tags" id="listTags"></div>

        <!-- Add Item Form -->
        <form class="add-item-form" id="addItemForm" autocomplete="off">
          <input type="text" id="itemNameInput" placeholder="Add an item..." required>
          <select id="itemCategorySelect"></select>
          <input type="number" id="itemQuantityInput" min="1" value="1" class="quantity-input">
          <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <!-- Progress -->
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <span class="progress-text" id="progressText"></span>

        <!-- Items -->
        <div class="items-container" id="itemsContainer"></div>
      </div>
    </main>
  </div>

  <!-- ====== MODAL ====== -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle"></h3>
        <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    // ===== CONSTANTS & DEFAULTS =====

    const STORAGE_KEY = 'shoplist_app_v1';

    const DEFAULT_CATEGORIES = [
      { id: 'cat_1', name: 'Produce',    color: '#4CAF50', emoji: '\u{1F966}', isDefault: true },
      { id: 'cat_2', name: 'Dairy',      color: '#2196F3', emoji: '\u{1F9C0}', isDefault: true },
      { id: 'cat_3', name: 'Meat',       color: '#E91E63', emoji: '\u{1F969}', isDefault: true },
      { id: 'cat_4', name: 'Bakery',     color: '#FF9800', emoji: '\u{1F35E}', isDefault: true },
      { id: 'cat_5', name: 'Beverages',  color: '#00BCD4', emoji: '\u{1F9C3}', isDefault: true },
      { id: 'cat_6', name: 'Household',  color: '#9C27B0', emoji: '\u{1F9F9}', isDefault: true },
      { id: 'cat_7', name: 'Frozen',     color: '#607D8B', emoji: '\u{2744}\u{FE0F}',  isDefault: true },
      { id: 'cat_8', name: 'Snacks',     color: '#FF5722', emoji: '\u{1F37F}', isDefault: true },
      { id: 'cat_9', name: 'Other',      color: '#795548', emoji: '\u{1F4E6}', isDefault: true },
    ];

    const DEFAULT_TAGS = [
      { id: 'tag_1', name: 'Urgent',  color: '#F44336', isDefault: true },
      { id: 'tag_2', name: 'Weekly',  color: '#2196F3', isDefault: true },
      { id: 'tag_3', name: 'Monthly', color: '#9C27B0', isDefault: true },
      { id: 'tag_4', name: 'Party',   color: '#FF9800', isDefault: true },
      { id: 'tag_5', name: 'Sale',    color: '#4CAF50', isDefault: true },
    ];

    // ===== STATE MANAGEMENT =====

    let state = loadState();
    let activeTagFilter = null;

    function generateId(prefix) {
      return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function createDefaultState() {
      return {
        lists: [],
        categories: structuredClone(DEFAULT_CATEGORIES),
        tags: structuredClone(DEFAULT_TAGS),
        activeListId: null,
      };
    }

    function setState(updater) {
      if (typeof updater === 'function') {
        updater(state);
      } else {
        Object.assign(state, updater);
      }
      saveState(state);
      render();
    }

    // ===== LOCAL STORAGE =====

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          // Ensure categories and tags arrays exist
          if (!Array.isArray(parsed.categories)) parsed.categories = structuredClone(DEFAULT_CATEGORIES);
          if (!Array.isArray(parsed.tags)) parsed.tags = structuredClone(DEFAULT_TAGS);
          if (!Array.isArray(parsed.lists)) parsed.lists = [];
          return parsed;
        }
      } catch (e) {
        console.error('Failed to load state:', e);
      }
      return createDefaultState();
    }

    function saveState(s) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
      } catch (e) {
        console.error('Failed to save state:', e);
      }
    }

    // ===== HELPERS =====

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function getActiveList() {
      return state.lists.find(l => l.id === state.activeListId) || null;
    }

    function getCategoryById(id) {
      return state.categories.find(c => c.id === id);
    }

    function getTagById(id) {
      return state.tags.find(t => t.id === id);
    }

    function getRemainingCount(list) {
      return list.items.filter(i => !i.checked).length;
    }

    // ===== RENDERING =====

    function render() {
      renderTagFilterBar();
      renderSidebar();
      renderMainContent();
    }

    function renderTagFilterBar() {
      const container = document.getElementById('tagFilterBar');
      if (state.tags.length === 0) {
        container.innerHTML = '';
        return;
      }
      let html = '';
      for (const tag of state.tags) {
        const active = activeTagFilter === tag.id ? ' active' : '';
        html += '<span class="tag-filter-chip' + active + '" data-tag-id="' + tag.id + '" style="background:' + escapeHtml(tag.color) + '">' + escapeHtml(tag.name) + '</span>';
      }
      container.innerHTML = html;
    }

    function renderSidebar() {
      const container = document.getElementById('listsNav');
      let filteredLists = state.lists;

      if (activeTagFilter) {
        filteredLists = state.lists.filter(l => l.tagIds && l.tagIds.includes(activeTagFilter));
      }

      if (filteredLists.length === 0) {
        container.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--sidebar-text);font-size:var(--font-size-sm);opacity:0.5;">' + (activeTagFilter ? 'No lists with this tag' : 'No lists yet') + '</div>';
        return;
      }

      let html = '';
      for (const list of filteredLists) {
        const active = list.id === state.activeListId ? ' active' : '';
        const remaining = getRemainingCount(list);
        const total = list.items.length;

        html += '<div class="list-card' + active + '" data-list-id="' + list.id + '">';
        html += '  <div class="list-card-content">';
        html += '    <span class="list-card-name">' + escapeHtml(list.name) + '</span>';
        html += '    <div class="list-card-meta">';
        html += '      <span class="list-card-count">' + remaining + ' of ' + total + ' remaining</span>';
        html += '    </div>';
        html += '  </div>';

        if (list.tagIds && list.tagIds.length > 0) {
          html += '  <div class="list-card-tags">';
          for (const tagId of list.tagIds) {
            const tag = getTagById(tagId);
            if (tag) {
              html += '<span class="tag-dot" style="background:' + escapeHtml(tag.color) + '" title="' + escapeHtml(tag.name) + '"></span>';
            }
          }
          html += '  </div>';
        }

        html += '</div>';
      }
      container.innerHTML = html;
    }

    function renderMainContent() {
      const emptyState = document.getElementById('emptyState');
      const listDetail = document.getElementById('listDetail');
      const mobileTitle = document.getElementById('mobileListTitle');

      const list = getActiveList();

      if (!list) {
        emptyState.style.display = 'flex';
        listDetail.hidden = true;
        mobileTitle.textContent = 'ShopList';
        return;
      }

      emptyState.style.display = 'none';
      listDetail.hidden = false;
      mobileTitle.textContent = list.name;

      renderListHeader(list);
      renderListTags(list);
      renderCategorySelect();
      renderProgressBar(list);
      renderItems(list);
    }

    function renderListHeader(list) {
      const nameEl = document.getElementById('listName');
      if (!nameEl.classList.contains('editing')) {
        nameEl.textContent = list.name;
      }
    }

    function renderListTags(list) {
      const container = document.getElementById('listTags');
      let html = '';

      if (list.tagIds) {
        for (const tagId of list.tagIds) {
          const tag = getTagById(tagId);
          if (tag) {
            html += '<span class="tag-chip" style="background:' + escapeHtml(tag.color) + '">';
            html += escapeHtml(tag.name);
            html += ' <span class="tag-chip-remove" data-tag-id="' + tag.id + '">&times;</span>';
            html += '</span>';
          }
        }
      }
      html += '<button class="tag-add-btn" id="addTagBtn">+ Tag</button>';
      container.innerHTML = html;
    }

    function renderCategorySelect() {
      const select = document.getElementById('itemCategorySelect');
      const currentValue = select.value;
      let html = '';
      for (const cat of state.categories) {
        html += '<option value="' + cat.id + '">' + cat.emoji + ' ' + escapeHtml(cat.name) + '</option>';
      }
      select.innerHTML = html;
      if (currentValue && state.categories.find(c => c.id === currentValue)) {
        select.value = currentValue;
      }
    }

    function renderProgressBar(list) {
      const bar = document.getElementById('progressBar');
      const text = document.getElementById('progressText');
      const total = list.items.length;
      const checked = list.items.filter(i => i.checked).length;

      if (total === 0) {
        bar.style.width = '0%';
        bar.classList.remove('complete');
        text.textContent = '';
        return;
      }

      const pct = Math.round((checked / total) * 100);
      bar.style.width = pct + '%';

      if (pct === 100) {
        bar.classList.add('complete');
        text.textContent = 'All done! \u{1F389}';
      } else {
        bar.classList.remove('complete');
        const remaining = total - checked;
        text.textContent = remaining + ' of ' + total + ' remaining';
      }
    }

    function renderItems(list) {
      const container = document.getElementById('itemsContainer');

      if (list.items.length === 0) {
        container.innerHTML = '<div class="empty-items-state"><div class="icon">\u{1F6D2}</div><p>No items yet.<br>Add your first item above!</p></div>';
        return;
      }

      // Group by category
      const groups = new Map();
      for (const item of list.items) {
        const catId = item.categoryId || 'cat_9';
        if (!groups.has(catId)) groups.set(catId, []);
        groups.get(catId).push(item);
      }

      // Sort groups by category order
      const categoryOrder = state.categories.map(c => c.id);
      const sortedGroups = [...groups.entries()].sort((a, b) => {
        let ai = categoryOrder.indexOf(a[0]);
        let bi = categoryOrder.indexOf(b[0]);
        if (ai === -1) ai = 9999;
        if (bi === -1) bi = 9999;
        return ai - bi;
      });

      let html = '';
      for (const [catId, items] of sortedGroups) {
        const cat = getCategoryById(catId) || { name: 'Other', color: '#795548', emoji: '\u{1F4E6}' };
        const unchecked = items.filter(i => !i.checked).sort((a, b) => a.createdAt - b.createdAt);
        const checked = items.filter(i => i.checked).sort((a, b) => a.createdAt - b.createdAt);
        const sortedItems = [...unchecked, ...checked];
        const uncheckedCount = unchecked.length;

        html += '<div class="category-group">';
        html += '<div class="category-group-header" style="--cat-color:' + cat.color + '">';
        html += '<span class="category-group-emoji">' + cat.emoji + '</span>';
        html += '<span class="category-group-name">' + escapeHtml(cat.name) + '</span>';
        html += '<span class="category-group-count">' + uncheckedCount + '/' + items.length + '</span>';
        html += '</div>';
        html += '<div class="category-group-items">';

        for (const item of sortedItems) {
          const checkedClass = item.checked ? ' checked' : '';
          const checkedAttr = item.checked ? ' checked' : '';
          html += '<div class="item-row' + checkedClass + '" data-item-id="' + item.id + '">';
          html += '<label class="item-checkbox">';
          html += '<input type="checkbox"' + checkedAttr + '>';
          html += '<span class="checkmark" style="--cat-color:' + cat.color + '"></span>';
          html += '</label>';
          html += '<span class="item-name">' + escapeHtml(item.name) + '</span>';

          html += '<div class="item-quantity">';
          html += '<button type="button" class="item-quantity-dec" title="Decrease">&minus;</button>';
          html += '<span class="item-quantity-value">' + (item.quantity || 1) + '</span>';
          html += '<button type="button" class="item-quantity-inc" title="Increase">+</button>';
          html += '</div>';

          html += '<button type="button" class="item-action-btn edit" title="Edit">\u{270F}\u{FE0F}</button>';
          html += '<button type="button" class="item-action-btn delete" title="Remove">\u{2716}</button>';
          html += '</div>';
        }

        html += '</div></div>';
      }

      container.innerHTML = html;
    }

    // ===== LIST ACTIONS =====

    function handleNewList() {
      const newList = {
        id: generateId('list'),
        name: 'New List',
        tagIds: [],
        items: [],
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
      setState(s => {
        s.lists.push(newList);
        s.activeListId = newList.id;
      });
      closeSidebar();
      setTimeout(() => startEditingListName(), 100);
    }

    function selectList(listId) {
      if (state.activeListId === listId) return;
      setState(s => { s.activeListId = listId; });
      closeSidebar();
    }

    function handleDuplicateList() {
      const source = getActiveList();
      if (!source) return;
      const newList = {
        ...structuredClone(source),
        id: generateId('list'),
        name: source.name + ' (Copy)',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        items: source.items.map(item => ({
          ...item,
          id: generateId('item'),
          checked: false,
        })),
      };
      setState(s => {
        s.lists.push(newList);
        s.activeListId = newList.id;
      });
    }

    function handleDeleteList() {
      const list = getActiveList();
      if (!list) return;
      showConfirmModal(
        'Delete "' + list.name + '"?',
        'This will permanently remove this list and all its items. This cannot be undone.',
        () => {
          setState(s => {
            s.lists = s.lists.filter(l => l.id !== list.id);
            s.activeListId = s.lists.length > 0 ? s.lists[0].id : null;
          });
        }
      );
    }

    function startEditingListName() {
      const nameEl = document.getElementById('listName');
      nameEl.contentEditable = 'true';
      nameEl.classList.add('editing');
      nameEl.focus();
      // Select all text
      const range = document.createRange();
      range.selectNodeContents(nameEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function finishEditingListName() {
      const nameEl = document.getElementById('listName');
      nameEl.contentEditable = 'false';
      nameEl.classList.remove('editing');

      const newName = nameEl.textContent.trim();
      const list = getActiveList();
      if (!list) return;

      if (newName && newName !== list.name) {
        setState(s => {
          const l = s.lists.find(l => l.id === s.activeListId);
          if (l) {
            l.name = newName;
            l.updatedAt = Date.now();
          }
        });
      } else {
        nameEl.textContent = list.name;
      }
    }

    // ===== ITEM ACTIONS =====

    function handleAddItem(e) {
      e.preventDefault();
      const nameInput = document.getElementById('itemNameInput');
      const categorySelect = document.getElementById('itemCategorySelect');
      const quantityInput = document.getElementById('itemQuantityInput');

      const name = nameInput.value.trim();
      if (!name) return;

      const newItem = {
        id: generateId('item'),
        name: name,
        categoryId: categorySelect.value,
        checked: false,
        quantity: Math.max(1, parseInt(quantityInput.value) || 1),
        createdAt: Date.now(),
      };

      setState(s => {
        const list = s.lists.find(l => l.id === s.activeListId);
        if (list) {
          list.items.push(newItem);
          list.updatedAt = Date.now();
        }
      });

      nameInput.value = '';
      quantityInput.value = '1';
      nameInput.focus();
    }

    function toggleItemChecked(itemId) {
      setState(s => {
        const list = s.lists.find(l => l.id === s.activeListId);
        if (!list) return;
        const item = list.items.find(i => i.id === itemId);
        if (item) {
          item.checked = !item.checked;
          list.updatedAt = Date.now();
        }
      });
    }

    function deleteItem(itemId) {
      setState(s => {
        const list = s.lists.find(l => l.id === s.activeListId);
        if (!list) return;
        list.items = list.items.filter(i => i.id !== itemId);
        list.updatedAt = Date.now();
      });
    }

    function changeQuantity(itemId, delta) {
      setState(s => {
        const list = s.lists.find(l => l.id === s.activeListId);
        if (!list) return;
        const item = list.items.find(i => i.id === itemId);
        if (item) {
          item.quantity = Math.max(1, (item.quantity || 1) + delta);
          list.updatedAt = Date.now();
        }
      });
    }

    function openEditItemModal(itemId) {
      const list = getActiveList();
      if (!list) return;
      const item = list.items.find(i => i.id === itemId);
      if (!item) return;

      let catOptions = '';
      for (const cat of state.categories) {
        const sel = cat.id === item.categoryId ? ' selected' : '';
        catOptions += '<option value="' + cat.id + '"' + sel + '>' + cat.emoji + ' ' + escapeHtml(cat.name) + '</option>';
      }

      const bodyHtml = '<div class="edit-item-form">' +
        '<div><label>Name</label><input type="text" id="editItemName" value="' + escapeHtml(item.name).replace(/"/g, '&quot;') + '"></div>' +
        '<div><label>Category</label><select id="editItemCategory">' + catOptions + '</select></div>' +
        '<div><label>Quantity</label><input type="number" id="editItemQuantity" min="1" value="' + (item.quantity || 1) + '"></div>' +
        '</div>';

      const footerHtml = '<button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>' +
        '<button class="btn btn-primary" id="modalConfirmBtn">Save</button>';

      openModal('Edit Item', bodyHtml, footerHtml, () => {
        const newName = document.getElementById('editItemName').value.trim();
        const newCategory = document.getElementById('editItemCategory').value;
        const newQuantity = Math.max(1, parseInt(document.getElementById('editItemQuantity').value) || 1);

        if (!newName) return;

        setState(s => {
          const l = s.lists.find(l => l.id === s.activeListId);
          if (!l) return;
          const it = l.items.find(i => i.id === itemId);
          if (it) {
            it.name = newName;
            it.categoryId = newCategory;
            it.quantity = newQuantity;
            l.updatedAt = Date.now();
          }
        });
      });

      setTimeout(() => {
        const input = document.getElementById('editItemName');
        if (input) { input.focus(); input.select(); }
      }, 100);
    }

    // ===== TAG ACTIONS =====

    function removeTagFromList(tagId) {
      setState(s => {
        const list = s.lists.find(l => l.id === s.activeListId);
        if (list && list.tagIds) {
          list.tagIds = list.tagIds.filter(id => id !== tagId);
          list.updatedAt = Date.now();
        }
      });
    }

    function openTagPickerModal() {
      const list = getActiveList();
      if (!list) return;

      let html = '<div class="tag-picker-grid">';
      for (const tag of state.tags) {
        const selected = list.tagIds && list.tagIds.includes(tag.id) ? ' selected' : '';
        html += '<span class="tag-picker-chip' + selected + '" data-tag-id="' + tag.id + '" style="background:' + escapeHtml(tag.color) + '">' + escapeHtml(tag.name) + '</span>';
      }
      html += '</div>';

      if (state.tags.length === 0) {
        html = '<p style="color:var(--color-text-muted);text-align:center;padding:1rem;">No tags yet. Create tags from the sidebar.</p>';
      }

      openModal('Select Tags', html, '<button class="btn btn-primary" id="modalConfirmBtn">Done</button>', () => {});

      // Wire up tag chip toggling
      setTimeout(() => {
        const chips = document.querySelectorAll('.tag-picker-chip');
        chips.forEach(chip => {
          chip.addEventListener('click', () => {
            const tagId = chip.dataset.tagId;
            chip.classList.toggle('selected');
            // Update state
            const l = state.lists.find(l => l.id === state.activeListId);
            if (!l) return;
            if (!l.tagIds) l.tagIds = [];
            if (l.tagIds.includes(tagId)) {
              l.tagIds = l.tagIds.filter(id => id !== tagId);
            } else {
              l.tagIds.push(tagId);
            }
            l.updatedAt = Date.now();
            saveState(state);
            renderSidebar();
            renderListTags(l);
          });
        });
      }, 50);
    }

    // ===== CATEGORY MANAGEMENT MODAL =====

    function openCategoriesModal() {
      renderCategoriesModalContent();
    }

    function renderCategoriesModalContent() {
      let html = '';
      for (const cat of state.categories) {
        html += '<div class="modal-row" data-cat-id="' + cat.id + '">';
        html += '<span class="modal-row-emoji">' + cat.emoji + '</span>';
        html += '<span class="modal-row-name">' + escapeHtml(cat.name) + '</span>';
        html += '<input type="color" class="cat-color-input" value="' + cat.color + '" data-cat-id="' + cat.id + '">';
        if (cat.isDefault) {
          html += '<span class="default-badge">default</span>';
        } else {
          html += '<button class="btn btn-icon btn-danger cat-delete-btn" data-cat-id="' + cat.id + '" title="Delete">\u{2716}</button>';
        }
        html += '</div>';
      }

      html += '<div class="modal-add-form">';
      html += '<input type="text" id="newCatEmoji" placeholder="\u{1F4E6}" style="width:50px;text-align:center;">';
      html += '<input type="text" id="newCatName" placeholder="Category name">';
      html += '<input type="color" id="newCatColor" value="#607D8B">';
      html += '<button class="btn btn-primary btn-sm" id="addCatBtn">Add</button>';
      html += '</div>';

      const footerHtml = '<button class="btn btn-primary" id="modalConfirmBtn">Done</button>';
      openModal('Manage Categories', html, footerHtml, () => {});

      setTimeout(wireCategoriesModalEvents, 50);
    }

    function wireCategoriesModalEvents() {
      // Color change
      document.querySelectorAll('.cat-color-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const catId = e.target.dataset.catId;
          setState(s => {
            const cat = s.categories.find(c => c.id === catId);
            if (cat) cat.color = e.target.value;
          });
        });
      });

      // Delete
      document.querySelectorAll('.cat-delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const catId = e.currentTarget.dataset.catId;
          setState(s => {
            s.categories = s.categories.filter(c => c.id !== catId);
            // Move items in deleted category to "Other"
            for (const list of s.lists) {
              for (const item of list.items) {
                if (item.categoryId === catId) item.categoryId = 'cat_9';
              }
            }
          });
          renderCategoriesModalContent();
        });
      });

      // Add new
      const addBtn = document.getElementById('addCatBtn');
      if (addBtn) {
        addBtn.addEventListener('click', () => {
          const emoji = document.getElementById('newCatEmoji').value.trim() || '\u{1F4E6}';
          const name = document.getElementById('newCatName').value.trim();
          const color = document.getElementById('newCatColor').value;
          if (!name) return;

          setState(s => {
            s.categories.push({
              id: generateId('cat'),
              name: name,
              color: color,
              emoji: emoji,
              isDefault: false,
            });
          });
          renderCategoriesModalContent();
        });
      }
    }

    // ===== TAG MANAGEMENT MODAL =====

    function openTagsModal() {
      renderTagsModalContent();
    }

    function renderTagsModalContent() {
      let html = '';
      for (const tag of state.tags) {
        html += '<div class="modal-row" data-tag-id="' + tag.id + '">';
        html += '<span class="modal-row-name">' + escapeHtml(tag.name) + '</span>';
        html += '<input type="color" class="tag-color-input" value="' + tag.color + '" data-tag-id="' + tag.id + '">';
        if (tag.isDefault) {
          html += '<span class="default-badge">default</span>';
        } else {
          html += '<button class="btn btn-icon btn-danger tag-delete-btn" data-tag-id="' + tag.id + '" title="Delete">\u{2716}</button>';
        }
        html += '</div>';
      }

      html += '<div class="modal-add-form">';
      html += '<input type="text" id="newTagName" placeholder="Tag name">';
      html += '<input type="color" id="newTagColor" value="#607D8B">';
      html += '<button class="btn btn-primary btn-sm" id="addTagBtn">Add</button>';
      html += '</div>';

      const footerHtml = '<button class="btn btn-primary" id="modalConfirmBtn">Done</button>';
      openModal('Manage Tags', html, footerHtml, () => {});

      setTimeout(wireTagsModalEvents, 50);
    }

    function wireTagsModalEvents() {
      // Color change
      document.querySelectorAll('.tag-color-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const tagId = e.target.dataset.tagId;
          setState(s => {
            const tag = s.tags.find(t => t.id === tagId);
            if (tag) tag.color = e.target.value;
          });
        });
      });

      // Delete
      document.querySelectorAll('.tag-delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tagId = e.currentTarget.dataset.tagId;
          setState(s => {
            s.tags = s.tags.filter(t => t.id !== tagId);
            // Remove tag from all lists
            for (const list of s.lists) {
              if (list.tagIds) {
                list.tagIds = list.tagIds.filter(id => id !== tagId);
              }
            }
          });
          if (activeTagFilter === tagId) activeTagFilter = null;
          renderTagsModalContent();
        });
      });

      // Add new
      const addBtn = document.getElementById('addTagBtn');
      if (addBtn) {
        addBtn.addEventListener('click', () => {
          const name = document.getElementById('newTagName').value.trim();
          const color = document.getElementById('newTagColor').value;
          if (!name) return;

          setState(s => {
            s.tags.push({
              id: generateId('tag'),
              name: name,
              color: color,
              isDefault: false,
            });
          });
          renderTagsModalContent();
        });
      }
    }

    // ===== MODAL SYSTEM =====

    let currentModalConfirm = null;

    function openModal(title, bodyHtml, footerHtml, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = bodyHtml;
      document.getElementById('modalFooter').innerHTML = footerHtml;
      document.getElementById('modalBackdrop').hidden = false;

      currentModalConfirm = onConfirm;

      const confirmBtn = document.getElementById('modalConfirmBtn');
      if (confirmBtn && onConfirm) {
        confirmBtn.addEventListener('click', () => {
          onConfirm();
          closeModal();
        });
      }

      const cancelBtn = document.getElementById('modalCancelBtn');
      if (cancelBtn) {
        cancelBtn.addEventListener('click', closeModal);
      }
    }

    function closeModal() {
      document.getElementById('modalBackdrop').hidden = true;
      currentModalConfirm = null;
    }

    function showConfirmModal(title, message, onConfirm) {
      const bodyHtml = '<p class="confirm-message">' + escapeHtml(message) + '</p>';
      const footerHtml = '<button class="btn btn-ghost" id="modalCancelBtn">Cancel</button>' +
        '<button class="btn btn-primary" style="background:var(--color-danger);color:#fff;" id="modalConfirmBtn">Delete</button>';
      openModal(title, bodyHtml, footerHtml, onConfirm);
    }

    // ===== SIDEBAR TOGGLE =====

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('visible');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('visible');
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('open')) {
        closeSidebar();
      } else {
        openSidebar();
      }
    }

    // ===== EVENT LISTENERS =====

    function initEventListeners() {
      // Sidebar
      document.getElementById('newListBtn').addEventListener('click', handleNewList);
      document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
      document.getElementById('sidebarCloseBtn').addEventListener('click', closeSidebar);

      // Lists navigation (delegation)
      document.getElementById('listsNav').addEventListener('click', (e) => {
        const card = e.target.closest('[data-list-id]');
        if (card) selectList(card.dataset.listId);
      });

      // Tag filter bar (delegation)
      document.getElementById('tagFilterBar').addEventListener('click', (e) => {
        const chip = e.target.closest('[data-tag-id]');
        if (chip) {
          const tagId = chip.dataset.tagId;
          activeTagFilter = activeTagFilter === tagId ? null : tagId;
          renderTagFilterBar();
          renderSidebar();
        }
      });

      // Mobile
      document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);

      // Main content
      document.getElementById('addItemForm').addEventListener('submit', handleAddItem);
      document.getElementById('editListNameBtn').addEventListener('click', startEditingListName);
      document.getElementById('duplicateListBtn').addEventListener('click', handleDuplicateList);
      document.getElementById('deleteListBtn').addEventListener('click', handleDeleteList);

      // List name editing
      const nameEl = document.getElementById('listName');
      nameEl.addEventListener('blur', finishEditingListName);
      nameEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          nameEl.blur();
        }
        if (e.key === 'Escape') {
          const list = getActiveList();
          if (list) nameEl.textContent = list.name;
          nameEl.blur();
        }
      });

      // Items container (delegation)
      document.getElementById('itemsContainer').addEventListener('click', (e) => {
        const itemEl = e.target.closest('[data-item-id]');
        if (!itemEl) return;
        const itemId = itemEl.dataset.itemId;

        if (e.target.closest('.item-checkbox')) {
          toggleItemChecked(itemId);
        } else if (e.target.closest('.item-action-btn.delete')) {
          deleteItem(itemId);
        } else if (e.target.closest('.item-action-btn.edit')) {
          openEditItemModal(itemId);
        } else if (e.target.closest('.item-quantity-dec')) {
          changeQuantity(itemId, -1);
        } else if (e.target.closest('.item-quantity-inc')) {
          changeQuantity(itemId, 1);
        }
      });

      // List tags (delegation)
      document.getElementById('listTags').addEventListener('click', (e) => {
        if (e.target.closest('.tag-chip-remove')) {
          const tagId = e.target.closest('.tag-chip-remove').dataset.tagId;
          removeTagFromList(tagId);
        } else if (e.target.closest('.tag-add-btn')) {
          openTagPickerModal();
        }
      });

      // Sidebar footer
      document.getElementById('manageCategoriesBtn').addEventListener('click', openCategoriesModal);
      document.getElementById('manageTagsBtn').addEventListener('click', openTagsModal);

      // Modal
      document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
      document.getElementById('modalBackdrop').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // Global keyboard
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (!document.getElementById('modalBackdrop').hidden) {
            closeModal();
          } else {
            closeSidebar();
          }
        }
      });
    }

    // ===== INITIALIZATION =====

    function init() {
      initEventListeners();
      render();
    }

    // Run when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
